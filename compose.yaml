services:
  postgres:
    image: postgres:16-alpine
    container_name: insight2sale-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: insight2sale
      POSTGRES_USER: postgres
      # 在仓库旁 .env 中设置 POSTGRES_PASSWORD（勿使用弱口令提交到 Git）
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insight2sale"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
